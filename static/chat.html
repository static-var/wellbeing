<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat — Wellbeing</title>
  <meta name="description" content="Chat with your Wellbeing companion." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="topbar-brand" aria-label="Wellbeing home">
        <span class="brand-dot" aria-hidden="true"></span>
        Wellbeing
      </a>
      <nav class="topbar-nav" aria-label="Main navigation">
        <a href="/chat.html" class="topbar-link active" aria-current="page">Chat</a>
        <a href="/settings.html" class="topbar-link">Settings</a>
        <div class="topbar-avatar" aria-label="Your profile" title="Profile" id="avatar-btn">
          <span aria-hidden="true">Y</span>
        </div>
      </nav>
    </div>
  </header>

  <main class="chat-layout">

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages" role="log" aria-label="Conversation" aria-live="polite">
      <div class="chat-messages-inner">
        <!-- Messages will be injected by JS -->
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <form class="chat-input-inner" id="chat-form" aria-label="Send a message">
        <label for="chat-input" class="sr-only">Type your message</label>
        <textarea
          id="chat-input"
          name="message"
          rows="1"
          placeholder="Type something… or just say hi"
          aria-label="Your message"
          autocomplete="off"
        ></textarea>
        <button type="submit" class="chat-send" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 2L11 13" /><path d="M22 2L15 22L11 13L2 9L22 2Z" />
          </svg>
        </button>
      </form>
      <p class="chat-disclaimer">
        Your companion is a supportive listener, not a therapist. 
        If you're in crisis, please reach out to a <a href="https://findahelpline.com/" target="_blank" rel="noopener">helpline near you</a>.
      </p>
    </div>
  </main>

  <!-- Screen-reader only style -->
  <style>.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}</style>

  <script src="/js/app.js"></script>
</body>
</html>
